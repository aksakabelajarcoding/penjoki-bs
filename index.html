<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AKSAKA | AYU</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #ff0055; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #fff; overflow: hidden; height: 100dvh; width: 100vw; font-family: 'Plus Jakarta Sans', sans-serif; }

        /* --- BACKGROUND VIDEO (DI LOCK DI BELAKANG) --- */
        .video-wrapper {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -2; /* Paling belakang */
            background: #000;
        }
        video#eye-bg { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.9); }
        
        /* Overlay transparan biar nggak nutupin klik */
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.1); z-index: -1; pointer-events: none; }

        /* --- HERO SECTION --- */
        #hero-slide {
            position: fixed; inset: 0; z-index: 50; /* Di atas video */
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: 1s cubic-bezier(0.85, 0, 0.15, 1);
        }

        .glitch-text {
            font-family: 'Orbitron'; font-size: 3.5rem; color: #fff;
            text-shadow: 0 0 15px var(--accent); letter-spacing: 8px;
            cursor: pointer; pointer-events: auto; /* Pastikan bisa diklik */
        }

        .btn-init {
            margin-top: 30px; padding: 18px 50px;
            background: #fff; color: #000;
            font-family: 'Orbitron'; font-weight: 900;
            border-radius: 50px; cursor: pointer;
            border: none; z-index: 100; /* Pastikan di depan */
            pointer-events: auto; /* WAJIB BIAR BISA DITEKAN */
            box-shadow: 0 10px 30px rgba(255,0,85,0.4);
            transition: 0.3s;
        }
        .btn-init:active { transform: scale(0.9); }

        /* --- MAIN CONTENT (YANG CERAH) --- */
        #main-app {
            display: none; position: relative; z-index: 10;
            background: #fff; height: 100dvh; padding: 30px;
            overflow-y: auto; text-align: center;
        }
    </style>
</head>
<body>

    <div class="video-wrapper">
        <video id="eye-bg" autoplay muted loop playsinline>
            <source src="https://files.catbox.moe/g1h8cv.mp4" type="video/mp4">
        </video>
    </div>
    <div class="overlay"></div>

    <div id="hero-slide">
        <h1 class="glitch-text" id="aksaka-trigger">AKSAKA</h1>
        <button class="btn-init" id="btn-initialize">INITIALIZE</button>
    </div>

    <div id="main-app">
        <h1 style="font-family:'Orbitron'; font-size: 2rem; color: var(--accent);">SYSTEM ONLINE</h1>
        <p style="margin-top:20px;">Halo Wak! Ini konten cerah lo yang tadi.</p>
        <button onclick="location.reload()" style="margin-top:50px; padding:10px 20px; border:1px solid #ccc; border-radius:10px;">Kembali Ke Mata</button>
    </div>

    <audio id="bgm" loop><source src="https://files.catbox.moe/6v0p6a.mp3" type="audio/mpeg"></audio>

    <script>
        const btn = document.getElementById('btn-initialize');
        const hero = document.getElementById('hero-slide');
        const app = document.getElementById('main-app');
        const bgm = document.getElementById('bgm');

        // FUNGSI UTAMA: BUKA WEBSITE
        btn.addEventListener('click', () => {
            console.log("Tombol ditekan!"); // Cek di console log
            bgm.play().catch(() => {});
            
            // Animasi transisi
            hero.style.opacity = "0";
            hero.style.transform = "translateY(-100%)";
            
            setTimeout(() => {
                hero.style.display = "none";
                app.style.display = "block";
                document.body.style.overflow = "auto";
                document.body.style.background = "#fff";
            }, 800);
        });

        // --- RAHASIA AKSAKA (KLIK NAMA 5X) ---
        let count = 0;
        document.getElementById('aksaka-trigger').addEventListener('click', () => {
            count++;
            if(count >= 5) {
                let pw = prompt("AKSAKA_PW:");
                if(pw === "0207") alert("Access Granted to Layer 6.");
                count = 0;
            }
        });

        // Paksa video jalan
        window.onload = () => { document.getElementById('eye-bg').play(); };
    </script>
</body>
</html>
