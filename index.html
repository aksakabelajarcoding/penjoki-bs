<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AKSAKA | FIX_LOGIN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #ff0055; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: #000; overflow: hidden; height: 100vh; width: 100vw; }

        /* VIDEO BACKGROUND */
        .video-container {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1; /* Paling belakang */
            pointer-events: none; /* Supaya video gak bisa disentuh */
        }
        video#eye-bg { width: 100%; height: 100%; object-fit: cover; }

        /* OVERLAY BIAR GAK GANGGU KLIK */
        .click-layer {
            position: fixed; inset: 0;
            z-index: 100; /* Lapisan utama konten */
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
        }

        .aksaka-title {
            font-family: 'Orbitron'; font-size: 3.5rem; color: #fff;
            text-shadow: 0 0 20px var(--accent); letter-spacing: 5px;
            margin-bottom: 40px; pointer-events: none; /* Biar judul gak ngalangin klik tombol */
        }

        /* TOMBOL INITIALIZE - SEKARANG ANTI GAGAL */
        .btn-gacor {
            position: relative;
            z-index: 999; /* PALING DEPAN */
            padding: 20px 60px;
            background: rgba(255, 255, 255, 0.9);
            color: #000; font-family: 'Orbitron'; font-weight: 900;
            border-radius: 50px; cursor: pointer;
            border: 4px solid var(--accent);
            box-shadow: 0 0 30px rgba(255, 0, 85, 0.6);
            pointer-events: auto !important; /* PAKSA BISA DIKLIK */
            transition: 0.2s;
            text-transform: uppercase;
        }
        .btn-gacor:active { transform: scale(0.9); background: var(--accent); color: #fff; }

        /* HALAMAN DALEM (CERAH) */
        #main-site {
            display: none; position: fixed; inset: 0;
            z-index: 2000; background: #fff;
            padding: 40px; text-align: center; overflow-y: auto;
        }
    </style>
</head>
<body>

    <div class="video-container">
        <video id="eye-bg" autoplay muted loop playsinline>
            <source src="https://files.catbox.moe/g1h8cv.mp4" type="video/mp4">
        </video>
    </div>

    <div class="click-layer" id="login-screen">
        <h1 class="aksaka-title">AKSAKA</h1>
        <button class="btn-gacor" id="enter-btn">INITIALIZE</button>
    </div>

    <div id="main-site">
        <h1 style="color:var(--accent); font-family:'Orbitron'; font-size: 2rem;">WELCOME BACK, BOSS</h1>
        <p style="margin-top:20px; color:#333;">Website lo udah kebuka sekarang. Gacor!</p>
        <button onclick="location.reload()" style="margin-top:100px; color:red;">KEMBALI KE MATA</button>
    </div>

    <audio id="bgm" loop><source src="https://files.catbox.moe/6v0p6a.mp3" type="audio/mpeg"></audio>

    <script>
        const loginScreen = document.getElementById('login-screen');
        const mainSite = document.getElementById('main-site');
        const btn = document.getElementById('enter-btn');
        const bgm = document.getElementById('bgm');

        // LOGIC KLIK YANG GAK BISA MELARIKAN DIRI
        btn.addEventListener('click', (e) => {
            e.stopPropagation(); // Stop gangguan dari layer lain
            console.log("LOGIN SUCCESS");
            
            // Putar musik
            bgm.play().catch(() => console.log("Musik butuh izin user"));

            // Efek transisi
            loginScreen.style.transition = "0.5s";
            loginScreen.style.opacity = "0";
            loginScreen.style.transform = "scale(1.2)";
            
            setTimeout(() => {
                loginScreen.style.display = "none";
                mainSite.style.display = "block";
            }, 500);
        });

        // Paksa video muter
        window.onload = () => { document.getElementById('eye-bg').play(); };
    </script>
</body>
</html>
